<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dog Image Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fafafa;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 1rem;
        }
        img {
            max-width: 90%;
            height: auto;
            margin-top: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <header>
        <h1>My Favorite Dog</h1>
    </header>

    <main>
        <img src="images/golden-retriever.jpg" alt="Golden Retriever">
    </main>

</body>
</html>
